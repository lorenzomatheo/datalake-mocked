name: Linters

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "**.py"
      - "**.ipynb"
      - "**.md"
      - ".github/**"
      - "pyproject.toml"
      - "requirements*"
      - ".pylintrc"
      - "**.tf"

jobs:
  setup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    outputs:
      python-version: ${{ matrix.python-version }}

  ruff:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v3
    - name: Run Ruff Check
      uses: astral-sh/ruff-action@v3
      with:
        args: check --output-format=github
        version: "0.15.6"

    - name: Run Ruff Format Check
      uses: astral-sh/ruff-action@v1
      with:
        args: format --check
        version: "0.15.6"

  pylint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ needs.setup.outputs.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ needs.setup.outputs.python-version }}
    - name: Install pylint
      run: |
        python -m pip install --upgrade pip
        pip install pylint
    - name: Run pylint
      run: pylint --rcfile=.pylintrc .

  terraform-validate:
    runs-on: ubuntu-latest
    name: Validate terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: terraform validate
        uses: dflook/terraform-validate@v2
        with:
          path: terraform

  terraform-fmt-check:
    runs-on: ubuntu-latest
    name: Format terraform files
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: terraform fmt
        uses: dflook/terraform-fmt-check@v2
        with:
          path: terraform

  markdown-format:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ needs.setup.outputs.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ needs.setup.outputs.python-version }}
    - name: Install mdformat
      run: |
        python -m pip install --upgrade pip
        pip install mdformat mdformat-gfm mdformat-tables
    - name: Run mdformat check
      run: mdformat --check .

  markdown-lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ needs.setup.outputs.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ needs.setup.outputs.python-version }}
    - name: Install pymarkdownlnt
      run: |
        python -m pip install --upgrade pip
        pip install pymarkdownlnt
    - name: Run pymarkdownlnt
      run: pymarkdownlnt --config .pymarkdown.json scan .

  notify-on-failure:
    runs-on: [self-hosted, omni]
    needs: [ruff, pylint, markdown-format, markdown-lint, terraform-validate, terraform-fmt-check]
    if: ${{ failure() }}
    steps:
      - name: Enviar notificacao de falha no Discord via Omni
        env:
          OMNI_BASE_URL: ${{ secrets.OMNI_BASE_URL }}
          OMNI_API_KEY: ${{ secrets.OMNI_API_KEY }}
          OMNI_DISCORD_INSTANCE_ID: ${{ secrets.OMNI_DISCORD_INSTANCE_ID }}
          OMNI_DISCORD_CHANNEL_ID: ${{ secrets.OMNI_DISCORD_CHANNEL_ID }}
        run: |
          FAILED_JOBS=""
          if [ "${{ needs.ruff.result }}" = "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}ruff, "
          fi
          if [ "${{ needs.pylint.result }}" = "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}pylint, "
          fi
          if [ "${{ needs.markdown-format.result }}" = "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}markdown-format, "
          fi
          if [ "${{ needs.markdown-lint.result }}" = "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}markdown-lint, "
          fi
          if [ "${{ needs.terraform-validate.result }}" = "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}terraform-validate, "
          fi
          if [ "${{ needs.terraform-fmt-check.result }}" = "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}terraform-fmt-check, "
          fi
          FAILED_JOBS="${FAILED_JOBS%, }"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="❌ **Falha no PR: ${{ github.event.pull_request.title }}**\n👤 Autor: ${{ github.actor }}\n🔴 Jobs com falha: ${FAILED_JOBS}\n🔗 Ver detalhes: ${RUN_URL}"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "${OMNI_BASE_URL}/api/v2/messages" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${OMNI_API_KEY}" \
            -d "{\"instanceId\": \"${OMNI_DISCORD_INSTANCE_ID}\", \"to\": \"${OMNI_DISCORD_CHANNEL_ID}\", \"text\": \"${MESSAGE}\"}")
          echo "Response: ${RESPONSE}"
