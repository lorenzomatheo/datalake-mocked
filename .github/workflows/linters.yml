name: Linters

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "**.py"
      - "**.ipynb"
      - "**.md"
      - ".github/**"
      - "pyproject.toml"
      - "requirements*"
      - ".pylintrc"
      - "**.tf"

jobs:
  setup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    outputs:
      python-version: ${{ matrix.python-version }}

  ruff:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v3
    - name: Run Ruff Check
      uses: astral-sh/ruff-action@v3
      with:
        args: check --output-format=github
        version: "0.15.6"

    - name: Run Ruff Format Check
      uses: astral-sh/ruff-action@v1
      with:
        args: format --check
        version: "0.15.6"

  pylint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ needs.setup.outputs.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ needs.setup.outputs.python-version }}
    - name: Install pylint
      run: |
        python -m pip install --upgrade pip
        pip install pylint
    - name: Run pylint
      run: pylint --rcfile=.pylintrc .

  terraform-validate:
    runs-on: ubuntu-latest
    name: Validate terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: terraform validate
        uses: dflook/terraform-validate@v2
        with:
          path: terraform

  terraform-fmt-check:
    runs-on: ubuntu-latest
    name: Format terraform files
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: terraform fmt
        uses: dflook/terraform-fmt-check@v2
        with:
          path: terraform

  markdown-format:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ needs.setup.outputs.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ needs.setup.outputs.python-version }}
    - name: Install mdformat
      run: |
        python -m pip install --upgrade pip
        pip install mdformat mdformat-gfm mdformat-tables
    - name: Run mdformat check
      run: mdformat --check .

  markdown-lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ needs.setup.outputs.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ needs.setup.outputs.python-version }}
    - name: Install pymarkdownlnt
      run: |
        python -m pip install --upgrade pip
        pip install pymarkdownlnt
    - name: Run pymarkdownlnt
      run: pymarkdownlnt --config .pymarkdown.json scan .
